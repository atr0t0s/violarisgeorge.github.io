# Papers
- title: "Attention Is All You Need"
  url: "https://arxiv.org/abs/1706.03762"
  description: "Vaswani et al., 2017. The Transformer paper. Everything since builds on this."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "BERT: Pre-training of Deep Bidirectional Transformers"
  url: "https://arxiv.org/abs/1810.04805"
  description: "Devlin et al., 2018. Bidirectional pre-training; set the template for fine-tuning that lasted years."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Language Models are Few-Shot Learners (GPT-3)"
  url: "https://arxiv.org/abs/2005.14165"
  description: "Brown et al., 2020. Showed that scale alone gets you surprisingly far without fine-tuning."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Scaling Laws for Neural Language Models"
  url: "https://arxiv.org/abs/2001.08361"
  description: "Kaplan et al., 2020. Loss scales predictably with model size, data, and compute."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Training Compute-Optimal Large Language Models (Chinchilla)"
  url: "https://arxiv.org/abs/2203.15556"
  description: "Hoffmann et al., 2022. Most models were undertrained for their compute budget."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Training Language Models to Follow Instructions (RLHF)"
  url: "https://arxiv.org/abs/2203.02155"
  description: "Ouyang et al., 2022. A 1.3B InstructGPT beat the 175B GPT-3 on human preference."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Constitutional AI: Harmlessness from AI Feedback"
  url: "https://arxiv.org/abs/2212.08073"
  description: "Bai et al., 2022. Anthropic's approach to alignment using AI feedback guided by a written constitution."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "Chain-of-Thought Prompting Elicits Reasoning"
  url: "https://arxiv.org/abs/2201.11903"
  description: "Wei et al., 2022. Asking the model to show its work actually makes it better at hard problems."
  category: "ai-llms"
  type: "paper"

- title: "Retrieval-Augmented Generation (RAG)"
  url: "https://arxiv.org/abs/2005.11401"
  description: "Lewis et al., 2020. The original RAG paper. Combines what the model knows with what it can look up."
  category: "ai-llms"
  type: "paper"
  curated: true

- title: "GPT-4 Technical Report"
  url: "https://arxiv.org/abs/2303.08774"
  description: "OpenAI, 2023. Capabilities, safety evals, multimodal inputs."
  category: "ai-llms"
  type: "paper"

- title: "LLaMA: Open and Efficient Foundation Language Models"
  url: "https://arxiv.org/abs/2302.13971"
  description: "Touvron et al., 2023. Meta's open-weight model that launched the open-source LLM wave."
  category: "ai-llms"
  type: "paper"

- title: "Mixture of Experts (Switch Transformers)"
  url: "https://arxiv.org/abs/2101.03961"
  description: "Fedus et al., 2022. Sparse MoE scaling to trillion-parameter models."
  category: "ai-llms"
  type: "paper"

- title: "LoRA: Low-Rank Adaptation of Large Language Models"
  url: "https://arxiv.org/abs/2106.09685"
  description: "Hu et al., 2021. Efficient fine-tuning by injecting trainable rank-decomposition matrices."
  category: "ai-llms"
  type: "paper"

- title: "Direct Preference Optimization (DPO)"
  url: "https://arxiv.org/abs/2305.18290"
  description: "Rafailov et al., 2023. Simpler alternative to RLHF that skips the reward model."
  category: "ai-llms"
  type: "paper"

- title: "Mamba: Linear-Time Sequence Modeling"
  url: "https://arxiv.org/abs/2312.00752"
  description: "Gu & Dao, 2023. State-space model that matches Transformer quality with linear scaling."
  category: "ai-llms"
  type: "paper"

- title: "Tree of Thoughts: Deliberate Problem Solving with LLMs"
  url: "https://arxiv.org/abs/2305.10601"
  description: "Yao et al., 2023. Extends chain-of-thought with branching and backtracking for complex reasoning."
  category: "ai-llms"
  type: "paper"

- title: "Textbooks Are All You Need (Phi-1)"
  url: "https://arxiv.org/abs/2306.11644"
  description: "Gunasekar et al., 2023. High-quality data matters more than quantity for training small models."
  category: "ai-llms"
  type: "paper"

- title: "DeepSeek-V3 Technical Report"
  url: "https://arxiv.org/abs/2412.19437"
  description: "DeepSeek, 2024. MoE model trained on 14.8T tokens with multi-token prediction."
  category: "ai-llms"
  type: "paper"

- title: "The Llama 3 Herd of Models"
  url: "https://arxiv.org/abs/2407.21783"
  description: "Meta, 2024. Open-weight models up to 405B with multilingual and multimodal capabilities."
  category: "ai-llms"
  type: "paper"

